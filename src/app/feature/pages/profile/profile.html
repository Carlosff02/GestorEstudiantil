<!-- ================= VIEW: PROFILE (EDITAR USUARIO) ================= -->
<section id="view-profile" class="view-section space-y-6" [ngClass]="a11yClass()">
    <div class="pb-6 border-b border-slate-100">
        <h2 class="text-xl sm:text-2xl font-black text-slate-900 tracking-tight">{{ t()['profileTitle'] }}</h2>
        <p class="text-xs sm:text-sm text-slate-400 font-medium">{{ t()['profileSubtitle'] }}</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Tarjeta Izquierda: Previsualización de Avatar -->
        <div class="bg-white p-5 sm:p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center justify-center text-center space-y-4">
            <div id="profile-avatar-preview" class="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-primary-600 text-white text-2xl sm:text-3xl font-black flex items-center justify-center shadow-lg shadow-primary-50">
                {{user()?.nombres?.[0]}}{{user()?.apellidos?.[0]}}
            </div>
            <div>
                <h3 id="profile-name-preview" class="text-base font-bold text-slate-800">{{user()?.nombres}}</h3>
                <p id="profile-role-preview" class="text-xs text-slate-400 font-semibold uppercase tracking-wider mt-1">{{ t()['estudiante'] }}</p>
            </div>
            <div class="w-full pt-4 border-t border-slate-50 text-[10px] text-slate-400 font-medium space-y-1">
                <p>{{ t()['version'] }}</p>
                <p>{{ t()['sesionActiva'] }}</p>
            </div>
        </div>

        <!-- Tarjeta Derecha: Campos editables que coinciden con el Type User -->
        <div class="lg:col-span-2 bg-white p-5 sm:p-6 rounded-2xl border border-slate-100 shadow-sm">
            <div class="space-y-5 text-xs">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="block text-slate-500 font-semibold">{{ t()['formNombres'] }}</label>
                        <input
                        [(ngModel)]="userToEdit().nombres"
                        type="text" id="profile-nombres" required class="w-full border border-slate-200 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-primary-100"
                        [placeholder]="t()['placeholderNombres']">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-slate-500 font-semibold">{{ t()['formApellidos'] }}</label>
                        <input
                        [(ngModel)]="userToEdit().apellidos"
                        type="text" id="profile-apellidos" required class="w-full border border-slate-200 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-primary-100"
                        [placeholder]="t()['placeholderApellidos']">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="block text-slate-500 font-semibold">{{ t()['formCorreo'] }}</label>
                        <input
                        [(ngModel)]="userToEdit().correo"
                        type="email" id="profile-correo" required class="w-full border border-slate-200 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-primary-100"
                        [placeholder]="t()['placeholderCorreo']">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-slate-500 font-semibold">{{ t()['formRol'] }}</label>
                        <input disabled [(ngModel)]="userToEdit().rol" type="text" id="profile-rol" required class="w-full border border-slate-200 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-primary-100"
                        [placeholder]="t()['placeholderRol']">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="block text-slate-500 font-semibold">{{ t()['formIdioma'] }}</label>
                        <select
                        [(ngModel)]="userToEdit().idioma"
                        id="profile-idioma" class="w-full border border-slate-200 rounded-lg p-2.5 outline-none bg-white">
                            <option value="es">Español</option>
                            <option value="en">English</option>
                            <option value="fr">Français</option>
                            <option value="pt">Portugués</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-slate-500 font-semibold">{{ t()['formAccesibilidad'] }}</label>
                        <select
                        [(ngModel)]="userToEdit().perfilAccesibilidad"
                        id="profile-accesibilidad" class="w-full border border-slate-200 rounded-lg p-2.5 outline-none bg-white">
                            <option value="normal">{{ t()['a11yNormal'] }}</option>
                            <option value="protanopia">{{ t()['a11yProtanopia'] }}</option>
                            <option value="deuteranopia">{{ t()['a11yDeuteranopia'] }}</option>
                            <option value="tritanopia">{{ t()['a11yTritanopia'] }}</option>
                            <option value="baja_vision">{{ t()['a11yBajaVision'] }}</option>
                            <option value="ceguera">{{ t()['a11yCeguera'] }}</option>
                        </select>
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-50 flex justify-end">
                    <button
                    (click)="updateUser()"
                    type="button" class="bg-primary-600 hover:bg-primary-700 text-white px-5 py-2.5 rounded-lg font-bold shadow-sm transition-colors flex items-center gap-1.5">
                      <lucide-angular [img]="Check" class="w-4 h-4"></lucide-angular> <span>{{ t()['btnSave'] }}</span>
                    </button>
                </div>
              </div>
        </div>
    </div>
</section>

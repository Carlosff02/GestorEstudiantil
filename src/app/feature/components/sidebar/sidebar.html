  <!-- Sidebar Navigation -->
    <aside id="sidebar" class="bg-white border-r border-slate-200 w-64 h-full flex flex-col fixed md:relative z-30 transition-transform duration-300 transform -translate-x-full md:translate-x-0">
        <!-- Logo -->
        <div class="h-16 flex items-center px-6 border-b border-slate-100">
            <div class="flex items-center gap-2 text-primary-600">
                <i data-lucide="layers" class="w-6 h-6"></i>
                <span class="font-bold text-lg tracking-tight">StudySync</span>
            </div>
            <button class="ml-auto md:hidden text-slate-400 hover:text-slate-600" onclick="toggleSidebar()">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- User Profile -->
        <div class="p-4 border-b border-slate-100">
            <div class="flex items-center gap-3 hover:bg-slate-50 p-2 rounded-lg cursor-pointer transition-colors">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-primary-500 to-indigo-500 text-white flex items-center justify-center font-bold shadow-sm">
                    AE
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-slate-900 truncate">Alex Estudiante</p>
                    <p class="text-xs text-slate-500 truncate">Ing. de Software</p>
                </div>
                <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
            </div>
        </div>

        <!-- Navigation Links -->
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <p class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Principal</p>

            <a [routerLink]="'dashboard'"
             [routerLinkActive]="'text-primary-600 bg-primary-50'"
            class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-colors" data-target="dashboard">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a [routerLink]="'courses'"
              [routerLinkActive]="'text-primary-600 bg-primary-50'"
            class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-colors" data-target="courses">
                <i data-lucide="book-open" class="w-5 h-5"></i> Mis Cursos
            </a>
            <a [routerLink]="'schedule'"
             [routerLinkActive]="'text-primary-600 bg-primary-50'"
            class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-colors" data-target="schedule">
                <i data-lucide="calendar" class="w-5 h-5"></i> Horario
            </a>

            <p class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mt-6 mb-2">Proyectos & Trabajo</p>

            <a href="#" onclick="switchView('projects')" class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-colors" data-target="projects">
                <i data-lucide="briefcase" class="w-5 h-5"></i> Mis Proyectos
            </a>
            <a href="#" class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-colors">
                <i data-lucide="folder-open" class="w-5 h-5"></i> Espacios de Trabajo
            </a>
        </nav>

        <!-- Time Tracker Widget -->
        <div class="p-4 border-t border-slate-200 bg-slate-50">
            <div id="tracker-widget" class="flex items-center justify-between bg-white border border-slate-200 p-3 rounded-xl shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="indicator w-3 h-3 rounded-full bg-slate-300"></div>
                    <div>
                        <p id="timer-label" class="text-[10px] font-semibold text-slate-500 uppercase">Tiempo Estudio</p>
                        <p id="timer-display" class="text-sm font-bold font-mono">00:00:00</p>
                    </div>
                </div>
                <button id="btn-toggle-timer" onclick="toggleTimer()" class="w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-600 transition-colors">
                    <i data-lucide="play" class="w-4 h-4" id="timer-icon"></i>
                </button>
            </div>
        </div>
    </aside>

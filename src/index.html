<!-- Filtros SVG de simulación de daltonismo, invisibles -->
<svg xmlns="http://www.w3.org/2000/svg" class="a11y-filters-def" aria-hidden="true" focusable="false">
  <defs>

    <!-- Protanopia: sin conos rojos -->
    <filter id="filter-protanopia">
      <feColorMatrix type="matrix" values="
        0.567, 0.433, 0,     0, 0
        0.558, 0.442, 0,     0, 0
        0,     0.242, 0.758, 0, 0
        0,     0,     0,     1, 0"/>
    </filter>

    <!-- Deuteranopia: sin conos verdes -->
    <filter id="filter-deuteranopia">
      <feColorMatrix type="matrix" values="
        0.625, 0.375, 0,   0, 0
        0.7,   0.3,   0,   0, 0
        0,     0.3,   0.7, 0, 0
        0,     0,     0,   1, 0"/>
    </filter>

    <!-- Tritanopia: sin conos azules -->
    <filter id="filter-tritanopia">
      <feColorMatrix type="matrix" values="
        0.95, 0.05,  0,     0, 0
        0,    0.433, 0.567, 0, 0
        0,    0.475, 0.525, 0, 0
        0,    0,     0,     1, 0"/>
    </filter>

  </defs>
</svg>
</html>
